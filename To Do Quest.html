  <style>
    :root {
      --bg: #0f0e17;
      --surface: #1a1830;
      --surface2: #242240;
      --primary: #ff6b6b;
      --secondary: #ffd93d;
      --accent: #6bcb77;
      --blue: #4d96ff;
      --purple: #c77dff;
      --text: #fffffe;
      --text-muted: #a7a9be;
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== STARS BACKGROUND ===== */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50% { opacity: var(--op, 0.6); transform: scale(1.2); }
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* ===== AUTH SCREEN ===== */
    #auth-screen {
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      border: 2px solid var(--surface2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 64px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .logo h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 32px;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 8px;
    }
    .logo p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .tab-switcher {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .form-group input::placeholder { color: var(--text-muted); }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #ff8e53);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,107,107,0.4);
      margin-top: 8px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,107,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      color: var(--primary);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

    /* ===== HOME SCREEN ===== */
    #home-screen { padding-bottom: 80px; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
    }
    .app-title {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logout-btn {
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      padding: 8px 14px;
      border-radius: 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { color: var(--primary); }

    /* Hero Card */
    .hero-card {
      margin: 0 20px 20px;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      border-radius: var(--radius);
      padding: 24px;
      border: 2px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(199,125,255,0.3), transparent 70%);
      border-radius: 50%;
    }
    .hero-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .avatar-wrap {
      position: relative;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(199,125,255,0.4);
    }
    .level-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: var(--secondary);
      color: #1a1830;
      font-family: 'Fredoka One', cursive;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      border: 2px solid var(--surface);
    }
    .hero-info h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      margin-bottom: 2px;
    }
    .hero-class {
      color: var(--purple);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .exp-bar-wrap {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
      position: relative;
    }
    .exp-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      border-radius: 20px;
      transition: width 0.8s ease;
      box-shadow: 0 0 10px rgba(77,150,255,0.5);
    }
    .exp-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* Stats Row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin: 0 20px 20px;
    }
    .stat-card {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 16px 12px;
      text-align: center;
      border: 2px solid var(--surface2);
    }
    .stat-icon { font-size: 24px; display: block; margin-bottom: 4px; }
    .stat-num {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      display: block;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

    /* Section */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
    }
    .add-btn {
      background: var(--primary);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      box-shadow: 0 4px 12px rgba(255,107,107,0.4);
    }
    .add-btn:hover { transform: scale(1.1) rotate(90deg); }

    /* Task Cards */
    .tasks-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 16px;
      border: 2px solid var(--surface2);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .task-card:hover { border-color: rgba(255,107,107,0.3); transform: translateX(4px); }
    .task-card.done { opacity: 0.5; }
    .task-card.done .task-title { text-decoration: line-through; }

    .task-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid var(--surface2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-check.checked { background: var(--accent); border-color: var(--accent); }

    .task-info { flex: 1; }
    .task-title { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
    .task-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; }
    .task-exp {
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      color: var(--secondary);
      flex-shrink: 0;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 2px solid var(--surface2);
      display: flex;
      padding: 8px 0 12px;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 700;
      transition: color 0.2s;
    }
    .nav-item .nav-icon { font-size: 22px; }
    .nav-item.active { color: var(--primary); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 32px 24px 40px;
      width: 100%;
      max-width: 500px;
      animation: slideUpModal 0.3s ease;
      border-top: 2px solid var(--surface2);
    }
    @keyframes slideUpModal {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }
    .modal .form-group input { background: var(--bg); }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-secondary {
      flex: 1;
      padding: 14px;
      background: var(--surface2);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-add {
      flex: 2;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #3ab04a);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(107,203,119,0.4);
    }

    /* Level Up Toast */
    .levelup-toast {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      background: linear-gradient(135deg, var(--secondary), #ffaa00);
      color: #1a1830;
      border-radius: var(--radius);
      padding: 32px 40px;
      text-align: center;
      z-index: 300;
      box-shadow: 0 20px 60px rgba(255,217,61,0.5);
      transition: all 0.3s;
    }
    .levelup-toast.show {
      display: block;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    .levelup-toast .big-emoji { font-size: 64px; display: block; }
    .levelup-toast h2 { font-family: 'Fredoka One', cursive; font-size: 28px; margin: 8px 0 4px; }
    .levelup-toast p { font-size: 14px; font-weight: 700; }

    /* EXP popup */
    .exp-popup {
      position: fixed;
      pointer-events: none;
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: var(--secondary);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 400;
      animation: expFloat 1.2s ease forwards;
    }
    @keyframes expFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }

    /* Login Bonus Modal */
    .bonus-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 250;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    .bonus-modal.open { display: flex; }
    .bonus-card {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      border: 2px solid var(--purple);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 60px rgba(199,125,255,0.3);
    }
    .bonus-card h2 { font-family: 'Fredoka One', cursive; font-size: 26px; margin: 12px 0 8px; }
    .bonus-card .streak { color: var(--secondary); font-weight: 800; font-size: 15px; margin-bottom: 20px; }
    .bonus-item-display {
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin-bottom: 20px;
    }
    .bonus-item-display .item-emoji { font-size: 56px; display: block; margin-bottom: 8px; }
    .bonus-item-display .item-name { font-family: 'Fredoka One', cursive; font-size: 18px; }
    .bonus-item-display .item-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>

<!-- ===== AUTH SCREEN ===== -->
<div class="screen active" id="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <span class="logo-icon">⚔️</span>
      <h1>To Do Quest</h1>
      <p>冒険が、あなたを強くする</p>
    </div>
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab(&#39;login&#39;)">ログイン</button>
      <button class="tab-btn" onclick="switchTab(&#39;register&#39;)">新規登録</button>
    </div>
    <div id="login-form" style="display: block;">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="quest@example.com">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()" id="login-btn">冒険を始める ⚔️</button>
    </div>
    <div id="register-form" style="display: none;">
      <div class="form-group">
        <label>ニックネーム</label>
        <input type="text" id="reg-name" placeholder="勇者の名前">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" placeholder="quest@example.com">
      </div>
      <div class="form-group">
        <label>パスワード（6文字以上）</label>
        <input type="password" id="reg-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doRegister()" id="reg-btn">勇者を作成する 🌟</button>
    </div>
    <div class="error-msg" id="auth-error"></div>
  </div>
</div>

<!-- ===== HOME SCREEN ===== -->
<div class="screen" id="home-screen">
  <!-- Top Bar -->
  <div class="top-bar">
    <span class="app-title">⚔️ To Do Quest</span>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>

  <!-- Hero Card -->
  <div class="hero-card">
    <div class="hero-top">
      <div class="avatar-wrap">
        <div class="avatar" id="hero-avatar">🧙</div>
        <span class="level-badge" id="hero-level-badge">Lv.1</span>
      </div>
      <div class="hero-info">
        <h2 id="hero-name">勇者</h2>
        <div class="hero-class" id="hero-class">見習い冒険者</div>
      </div>
    </div>
    <div class="exp-label">
      <span>⭐ EXP</span>
      <span id="exp-text">0 / 100</span>
    </div>
    <div class="exp-bar-wrap">
      <div class="exp-bar" id="exp-bar" style="width: 0%"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-icon">✅</span>
      <span class="stat-num" id="stat-done">0</span>
      <span class="stat-label">完了</span>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🔥</span>
      <span class="stat-num" id="stat-streak">0</span>
      <span class="stat-label">連続日数</span>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🎒</span>
      <span class="stat-num" id="stat-items">0</span>
      <span class="stat-label">アイテム</span>
    </div>
  </div>

  <!-- Today's Tasks -->
  <div class="section-header">
    <span class="section-title">📜 今日のクエスト</span>
    <button class="add-btn" onclick="openAddTask()">+</button>
  </div>
  <div class="tasks-list" id="tasks-list">
    <div class="empty-state">
      <span>🗺️</span>
      <p>まだクエストがありません<br>+ボタンで追加しよう！</p>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navTo(&#39;home&#39;)">
      <span class="nav-icon">🏠</span>ホーム
    </button>
    <button class="nav-item" onclick="navTo(&#39;quests&#39;)">
      <span class="nav-icon">⚔️</span>クエスト
    </button>
    <button class="nav-item" onclick="navTo(&#39;group&#39;)">
      <span class="nav-icon">👥</span>グループ
    </button>
    <button class="nav-item" onclick="navTo(&#39;profile&#39;)">
      <span class="nav-icon">👤</span>プロフィール
    </button>
  </nav>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="add-task-modal">
  <div class="modal">
    <h3>📜 クエスト追加</h3>
    <div class="form-group">
      <label>クエスト名</label>
      <input type="text" id="task-title-input" placeholder="例：参考書を1章読む">
    </div>
    <div class="form-group">
      <label>期限（任意）</label>
      <input type="date" id="task-deadline-input">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeAddTask()">キャンセル</button>
      <button class="btn-add" onclick="addTask()">追加する ✨</button>
    </div>
  </div>
</div>

<!-- Level Up Toast -->
<div class="levelup-toast" id="levelup-toast">
  <span class="big-emoji">🎉</span>
  <h2>レベルアップ！</h2>
  <p id="levelup-text">Lv.2 になった！</p>
</div>

<!-- Login Bonus Modal -->
<div class="bonus-modal" id="bonus-modal">
  <div class="bonus-card">
    <span style="font-size:48px">🎁</span>
    <h2>ログインボーナス！</h2>
    <div class="streak" id="bonus-streak">3日連続ログイン中！</div>
    <div class="bonus-item-display">
      <span class="item-emoji" id="bonus-emoji">⭐</span>
      <div class="item-name" id="bonus-name">EXPブースト</div>
      <div class="item-desc" id="bonus-desc">1時間EXP1.5倍！</div>
    </div>
    <button class="btn-primary" onclick="claimBonus()" style="margin-top:0">受け取る！</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, updateDoc, collection,
    addDoc, onSnapshot, query, where, orderBy, serverTimestamp, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5BeexWSsnzvMKP0ZPHvreTzIP873w08U",
    authDomain: "todo-quest-705ab.firebaseapp.com",
    projectId: "todo-quest-705ab",
    storageBucket: "todo-quest-705ab.firebasestorage.app",
    messagingSenderId: "1019928851142",
    appId: "1:1019928851142:web:a15a9533c7819f2054ddc7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ===== STARS =====
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --op:${0.3+Math.random()*0.7};
      animation-delay:${Math.random()*4}s;
    `;
    starsEl.appendChild(s);
  }

  // ===== STATE =====
  let currentUser = null;
  let userData = null;
  let tasksUnsub = null;

  // ===== RPG CONFIG =====
  const EXP_PER_TASK = 30;
  const expToLevel = lv => lv * 100;
  const getClass = lv => {
    if (lv < 5) return '見習い冒険者';
    if (lv < 10) return '冒険者';
    if (lv < 20) return '熟練冒険者';
    if (lv < 30) return '勇者';
    return '伝説の勇者';
  };
  const getAvatar = lv => {
    if (lv < 5) return '🧙';
    if (lv < 10) return '⚔️';
    if (lv < 20) return '🛡️';
    if (lv < 30) return '👑';
    return '🌟';
  };

  // LOGIN BONUS ITEMS
  const bonusItems = [
    { emoji:'⭐', name:'EXPブースト', desc:'1時間EXP1.5倍！' },
    { emoji:'👏', name:'応援チケット', desc:'友達に贈れる！' },
    { emoji:'🎀', name:'リボン（アバター）', desc:'アバターに装備できる！' },
    { emoji:'💎', name:'レアジェム', desc:'特別なアイテムと交換できる！' },
    { emoji:'🔥', name:'炎エフェクト', desc:'アバターに炎オーラ！' },
    { emoji:'🌙', name:'月のアクセ', desc:'夜空の神秘を纏う！' },
    { emoji:'🏆', name:'トロフィー', desc:'7日連続ログイン報酬！', },
  ];

  // ===== AUTH STATE =====
  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      await loadUserData();
      showScreen('home-screen');
      subscribeToTasks();
      checkLoginBonus();
    } else {
      currentUser = null;
      userData = null;
      if (tasksUnsub) { tasksUnsub(); tasksUnsub = null; }
      showScreen('auth-screen');
    }
  });

  // ===== SCREENS =====
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  window.showScreen = showScreen;

  // ===== TABS =====
  window.switchTab = (tab) => {
    document.getElementById('auth-error').textContent = '';
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  };

  // ===== REGISTER =====
  window.doRegister = async () => {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('reg-btn');
    if (!name || !email || !pass) { errEl.textContent = '全て入力してください'; return; }
    if (pass.length < 6) { errEl.textContent = 'パスワードは6文字以上'; return; }
    btn.disabled = true; btn.textContent = '作成中...';
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        nickname: name,
        email,
        level: 1,
        exp: 0,
        loginStreak: 1,
        lastLoginDate: new Date().toDateString(),
        totalCompleted: 0,
        items: [],
        createdAt: serverTimestamp()
      });
    } catch (e) {
      errEl.textContent = getAuthError(e.code);
      btn.disabled = false; btn.textContent = '勇者を作成する 🌟';
    }
  };

  // ===== LOGIN =====
  window.doLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('login-btn');
    if (!email || !pass) { errEl.textContent = 'メールとパスワードを入力してください'; return; }
    btn.disabled = true; btn.textContent = 'ログイン中...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      errEl.textContent = getAuthError(e.code);
      btn.disabled = false; btn.textContent = '冒険を始める ⚔️';
    }
  };

  // ===== LOGOUT =====
  window.doLogout = async () => { await signOut(auth); };

  // ===== LOAD USER =====
  async function loadUserData() {
    const snap = await getDoc(doc(db, 'users', currentUser.uid));
    if (snap.exists()) {
      userData = snap.data();
      renderHero();
    }
  }

  function renderHero() {
    if (!userData) return;
    const { nickname, level, exp, loginStreak, totalCompleted, items } = userData;
    const needed = expToLevel(level);
    const pct = Math.min((exp / needed) * 100, 100);
    document.getElementById('hero-name').textContent = nickname || '勇者';
    document.getElementById('hero-level-badge').textContent = `Lv.${level}`;
    document.getElementById('hero-class').textContent = getClass(level);
    document.getElementById('hero-avatar').textContent = getAvatar(level);
    document.getElementById('exp-text').textContent = `${exp} / ${needed}`;
    document.getElementById('exp-bar').style.width = pct + '%';
    document.getElementById('stat-streak').textContent = loginStreak || 0;
    document.getElementById('stat-done').textContent = totalCompleted || 0;
    document.getElementById('stat-items').textContent = (items || []).length;
  }

  // ===== LOGIN BONUS =====
  async function checkLoginBonus() {
    if (!userData) return;
    const today = new Date().toDateString();
    if (userData.lastLoginDate === today) return;
    const streak = (userData.loginStreak || 0) + 1;
    const itemIndex = (streak - 1) % bonusItems.length;
    const item = bonusItems[itemIndex];
    await updateDoc(doc(db, 'users', currentUser.uid), {
      lastLoginDate: today,
      loginStreak: streak,
      items: [...(userData.items || []), item.name]
    });
    userData.lastLoginDate = today;
    userData.loginStreak = streak;
    userData.items = [...(userData.items || []), item.name];
    document.getElementById('bonus-streak').textContent = `${streak}日連続ログイン中！`;
    document.getElementById('bonus-emoji').textContent = item.emoji;
    document.getElementById('bonus-name').textContent = item.name;
    document.getElementById('bonus-desc').textContent = item.desc;
    document.getElementById('bonus-modal').classList.add('open');
    renderHero();
  }

  window.claimBonus = () => {
    document.getElementById('bonus-modal').classList.remove('open');
  };

  // ===== TASKS =====
  function subscribeToTasks() {
    if (tasksUnsub) tasksUnsub();
    const today = new Date(); today.setHours(0,0,0,0);
    const q = query(collection(db, 'tasks'), where('userId', '==', currentUser.uid), orderBy('createdAt', 'desc'));
    tasksUnsub = onSnapshot(q, snap => {
      const tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTasks(tasks);
    });
  }

  function renderTasks(tasks) {
    const list = document.getElementById('tasks-list');
    if (tasks.length === 0) {
      list.innerHTML = `<div class="empty-state"><span>🗺️</span><p>まだクエストがありません<br>+ボタンで追加しよう！</p></div>`;
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-card ${t.isComplete ? 'done' : ''}" id="task-${t.id}">
        <button class="task-check ${t.isComplete ? 'checked' : ''}" onclick="toggleTask('${t.id}', ${t.isComplete})">
          ${t.isComplete ? '✓' : ''}
        </button>
        <div class="task-info">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            ${t.deadline ? `📅 ${t.deadline}` : '期限なし'}
          </div>
        </div>
        <span class="task-exp">+${EXP_PER_TASK}EXP</span>
      </div>
    `).join('');
  }

  window.toggleTask = async (taskId, isDone) => {
    if (isDone) return;
    const taskEl = document.getElementById(`task-${taskId}`);
    await updateDoc(doc(db, 'tasks', taskId), { isComplete: true, completedAt: serverTimestamp() });
    await gainExp(EXP_PER_TASK, taskEl);
    await updateDoc(doc(db, 'users', currentUser.uid), { totalCompleted: (userData.totalCompleted || 0) + 1 });
    userData.totalCompleted = (userData.totalCompleted || 0) + 1;
    renderHero();
  };

  async function gainExp(amount, sourceEl) {
    if (!userData) return;
    const boostActive = userData.items?.includes('EXPブースト');
    const actual = boostActive ? Math.floor(amount * 1.5) : amount;
    showExpPopup(`+${actual} EXP ⭐`, sourceEl);
    let exp = (userData.exp || 0) + actual;
    let level = userData.level || 1;
    let leveled = false;
    while (exp >= expToLevel(level)) {
      exp -= expToLevel(level);
      level++;
      leveled = true;
    }
    userData.exp = exp;
    userData.level = level;
    await updateDoc(doc(db, 'users', currentUser.uid), { exp, level });
    renderHero();
    if (leveled) showLevelUp(level);
  }

  function showExpPopup(text, sourceEl) {
    const popup = document.createElement('div');
    popup.className = 'exp-popup';
    popup.textContent = text;
    const rect = sourceEl ? sourceEl.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/2 };
    popup.style.left = rect.left + 'px';
    popup.style.top = (rect.top + window.scrollY) + 'px';
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 1200);
  }

  function showLevelUp(level) {
    const toast = document.getElementById('levelup-toast');
    document.getElementById('levelup-text').textContent = `Lv.${level} ${getClass(level)} になった！`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ===== ADD TASK MODAL =====
  window.openAddTask = () => {
    document.getElementById('add-task-modal').classList.add('open');
    document.getElementById('task-title-input').focus();
  };
  window.closeAddTask = () => {
    document.getElementById('add-task-modal').classList.remove('open');
    document.getElementById('task-title-input').value = '';
    document.getElementById('task-deadline-input').value = '';
  };
  window.addTask = async () => {
    const title = document.getElementById('task-title-input').value.trim();
    const deadline = document.getElementById('task-deadline-input').value;
    if (!title) return;
    await addDoc(collection(db, 'tasks'), {
      userId: currentUser.uid,
      title,
      deadline: deadline || null,
      isComplete: false,
      createdAt: serverTimestamp()
    });
    closeAddTask();
  };

  // ===== NAV =====
  window.navTo = (page) => {
    document.querySelectorAll('.nav-item').forEach((b,i) => {
      b.classList.toggle('active', ['home','quests','group','profile'][i] === page);
    });
    // 他の画面は今後実装
  };

  // ===== UTILS =====
  function getAuthError(code) {
    const map = {
      'auth/email-already-in-use': 'このメールアドレスは既に使用中です',
      'auth/invalid-email': '無効なメールアドレスです',
      'auth/weak-password': 'パスワードが弱すぎます',
      'auth/user-not-found': 'ユーザーが見つかりません',
      'auth/wrong-password': 'パスワードが間違っています',
      'auth/invalid-credential': 'メールアドレスまたはパスワードが間違っています',
    };
    return map[code] || 'エラーが発生しました。もう一度試してください';
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>


</body></html>
